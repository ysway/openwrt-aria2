# Adapted from OpenWrt packages net/aria2/files/aria2.conf.
# Upstream aria2 UCI options are supported here by replacing '-' with '_'.
# For example: 'rpc-secret' -> 'rpc_secret'.
#
# This package also keeps compatibility with earlier aria2-static configs by
# accepting legacy keys such as download_dir and dht_enable.

config aria2 'main'
	option enabled '0'
	option user ''
	option dir '/tmp/aria2/downloads'
	option config_dir '/var/etc/aria2'
	option rpc_listen_port '6800'
	option rpc_secret ''
	option max_concurrent_downloads '5'
	option max_connection_per_server '5'
	option bt_enable_lpd 'true'
	option enable_dht 'true'
	option follow_torrent 'true'
	option file_allocation 'none'
	option save_session_interval '30'

	# Optional RPC example:
	# option rpc_auth_method 'token'
	# option rpc_secret 'change-me'

	# Add additional HTTP headers here.
	# list header 'User-Agent: aria2-static/1.37.0'

	# Add BitTorrent trackers here.
	# list bt_tracker 'https://tracker.example.com/announce'

	# Add raw aria2 settings here when no dedicated UCI option exists.
	# list extra_settings 'check-integrity=true'
