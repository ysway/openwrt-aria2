name: Release & Feed

on:
  workflow_run:
    workflows: ["Build aria2"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Build workflow run ID to release from'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Publish Release & Feed
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Determine run ID
        id: run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_id=${{ inputs.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/

      - name: Get aria2 version
        id: version
        run: |
          ARIA2_VERSION=$(grep '^AC_INIT' aria2-builder/configure.ac | sed -n 's/.*\[\([0-9][0-9.]*\)\].*/\1/p')
          BUILD_DATE=$(date -u +%Y%m%d)
          RELEASE_TAG="v${ARIA2_VERSION}-openwrt-${BUILD_DATE}"
          echo "aria2_version=$ARIA2_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"

      - name: Compute checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.ipk' -o -name 'aria2c' -o -name 'BUILDINFO' \) \
            -exec sha256sum {} \; | sort > ../checksums.sha256
          cat ../checksums.sha256

      - name: Build release notes
        id: notes
        run: |
          ARIA2_VERSION="${{ steps.version.outputs.aria2_version }}"
          cat > release_notes.md <<'HEADER'
          ## aria2-static for OpenWrt

          HEADER

          echo "**aria2 version:** ${ARIA2_VERSION}" >> release_notes.md
          echo "**Build date:** ${{ steps.version.outputs.build_date }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Targets" >> release_notes.md
          echo "" >> release_notes.md

          for dir in artifacts/aria2-static-*/; do
            [ -d "$dir" ] || continue
            PLATFORM=$(basename "$dir" | sed 's/aria2-static-//')
            echo "- \`$PLATFORM\`" >> release_notes.md
          done

          echo "" >> release_notes.md
          echo "### Checksums" >> release_notes.md
          echo '```' >> release_notes.md
          cat checksums.sha256 >> release_notes.md
          echo '```' >> release_notes.md

      - name: Collect release assets
        run: |
          mkdir -p release_assets
          # Gather all .ipk files and BUILDINFO files
          find artifacts/ -name '*.ipk' -exec cp {} release_assets/ \;
          # Also copy raw binaries with platform suffix
          for dir in artifacts/aria2-static-*/; do
            [ -d "$dir" ] || continue
            PLATFORM=$(basename "$dir" | sed 's/aria2-static-//')
            if [ -f "$dir/aria2c" ]; then
              cp "$dir/aria2c" "release_assets/aria2c-${PLATFORM}"
            fi
          done
          cp checksums.sha256 release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: "aria2-static ${{ steps.version.outputs.aria2_version }} (OpenWrt ${{ steps.version.outputs.build_date }})"
          body_path: release_notes.md
          draft: true
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update feed branch
        run: |
          FEED_DIR=$(mktemp -d)
          bash build_scripts/gen_feed.sh artifacts/ "$FEED_DIR"

          # Push to feed branch
          cd "$FEED_DIR"
          git init
          git checkout -b feed
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "feed: update for ${{ steps.version.outputs.release_tag }}"

          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin feed
