name: Sync Upstream

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Check for upstream aria2-builder updates
    # Git-only automation job; no Docker or privileged build steps required.
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodule to latest upstream
        id: update
        run: |
          set -euo pipefail
          OLD_SHA=$(git rev-parse HEAD:aria2-builder)
          git submodule update --init --remote -- aria2-builder
          NEW_SHA=$(git -C aria2-builder rev-parse HEAD)

          git add aria2-builder

          echo "old_sha=$OLD_SHA" >> "$GITHUB_OUTPUT"
          echo "new_sha=$NEW_SHA" >> "$GITHUB_OUTPUT"

          if git diff --cached --quiet -- aria2-builder; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Submodule already up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Submodule updated: $OLD_SHA -> $NEW_SHA"
          fi

      - name: Commit updated gitlink
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update aria2-builder submodule to ${{ steps.update.outputs.new_sha }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Trigger build workflow
        if: steps.update.outputs.changed == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            // Pushes created with GITHUB_TOKEN do not trigger other workflows,
            // so dispatch the build explicitly after updating the default branch.
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'build-aria2',
              client_payload: {
                sha: '${{ steps.update.outputs.new_sha }}'
              }
            });
